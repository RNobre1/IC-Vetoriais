# Stack experimental — 3 SGBDs vetoriais em paralelo.
# Versões pinadas conforme vault/decisões/2026-05-05-versoes-imagens-docker.md.
# Healthchecks garantem que `make smoke` espera o serviço estar pronto, não só "started".

services:
  postgres-pgvector:
    image: pgvector/pgvector:pg16
    container_name: ic-pgvector
    environment:
      POSTGRES_DB: ${PG_DATABASE:-icvet}
      POSTGRES_USER: ${PG_USER:-icvet}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-icvet}
    ports:
      - "${PG_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-icvet} -d ${PG_DATABASE:-icvet}"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.0
    container_name: ic-qdrant
    ports:
      - "${QDRANT_HTTP_PORT:-6333}:6333"
      - "${QDRANT_GRPC_PORT:-6334}:6334"
    volumes:
      - qdrantdata:/qdrant/storage
    healthcheck:
      # /healthz é endpoint nativo do Qdrant; não temos curl/wget garantidos na imagem oficial slim,
      # então usamos `bash` + `/dev/tcp` (built-in) para checar TCP-level no porto HTTP.
      test: ["CMD-SHELL", "bash -c '</dev/tcp/localhost/6333' || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 10s
    restart: unless-stopped

  weaviate:
    image: semitechnologies/weaviate:1.27.0
    container_name: ic-weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: "25"
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: "/var/lib/weaviate"
      DEFAULT_VECTORIZER_MODULE: "none"
      ENABLE_MODULES: ""
      CLUSTER_HOSTNAME: "node1"
    ports:
      - "${WEAVIATE_PORT:-8080}:8080"
    volumes:
      - weaviatedata:/var/lib/weaviate
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/v1/.well-known/ready || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 15s
    restart: unless-stopped

volumes:
  pgdata:
  qdrantdata:
  weaviatedata:
